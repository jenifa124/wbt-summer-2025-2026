<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form2</title>

</head>

<body>
    <form class="card">
        <div class="card-header">
            <h1>Registration </h1>
            <p>Please fill out the form below to create your account.</p>
        </div>

        <div class="field">

            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="jane doe">
        </div>

        <div class="field">

            <label for="postalcode">Postal Code</label>
            <input type="number" id="postalcode" placeholder="10001">
        </div>

        <div class="field">

            <label for="dob">Date of Birth</label>
            <input type="date" id="dob" placeholder="25/06/2026">
        </div>

        <div class="field">

            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="jane@example.com">

        </div>

        <div class="field">

            <label for="password">Password</label>
            <input type="password" id="password" placeholder="****">
        </div>
        <div class="field">
            <label for="country">Country</label>
            <select id="country" name="country">
                <option value="">Select a country</option>
                <option value="IN">India</option>
                <option value="BR">Bangladesh</option>
                <option value="Pk">Pakistan </option>
            </select>
        </div><br>
        <div class="button">
            <input type="submit" value="Submit">
            <input type="reset" value="Reset">
        </div>
    </form>
</body>

</html>
