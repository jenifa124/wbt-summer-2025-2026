<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form3</title>

</head>

<body>
    <form class="card">
        <div class="card-header">
            <h1>Create your Account </h1>
            <p>Join us in a couple of steps.</p>
        </div>
        <div class="field">

            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="jane doe">
        </div>

        <div class="field">

            <label for="age">Age</label>
            <input type="number" id="age" placeholder="28">
        </div>

        <div class="field">

            <label for="dob">Date of Birth</label>
            <input type="date" id="dob" placeholder="25/06/2026">
        </div>

        <div class="field">

            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="jane@example.com">

        </div>

        <div class="field">

            <label for="password">Password</label>
            <input type="password" id="password" placeholder="****">
        </div>

        <label for="preferrdcontact">Preferred contact </label><br>
        <input type="radio" id="preferrdcontact" name="preferrdcontact" value="email">
        <label for="preferrdcontact"> Email </label>
        <input type="radio" id="preferrdcontact" name="preferrdcontact" value="phone">
        <label for="preferrdcontact"> Phone </label>
        <input type="radio" id="preferrdcontact" name="preferrdcontact" value="sms">
        <label for="preferrdcontact"> SMS </label><br><br>

        <input type="submit" class="btn-primary">
        <input type="reset" class="btn-Secondary">


    </form>



</body>

</html>
